name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22' # Adjust to your Node.js version
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set deployment environment
        id: env
        run: |
          # Use manual input if triggered manually, otherwise default to all environments
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            echo "deploy_mode=single" >> $GITHUB_OUTPUT
          else
            ENV="all"
            echo "deploy_mode=all" >> $GITHUB_OUTPUT
          fi
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          
          # Set paths for single environment deployment
          if [ "$ENV" = "production" ]; then
            echo "pm2_app=taxlah-production-api" >> $GITHUB_OUTPUT
            echo "deploy_path=/home/taxlah/api/production" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "staging" ]; then
            echo "pm2_app=taxlah-staging-api" >> $GITHUB_OUTPUT
            echo "deploy_path=/home/taxlah/api/staging" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "development" ]; then
            echo "pm2_app=taxlah-development-api" >> $GITHUB_OUTPUT
            echo "deploy_path=/home/taxlah/api/development" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH with password
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to all environments
        if: steps.env.outputs.deploy_mode == 'all'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          # Deploy to all three environments
          for ENV in development staging production; do
            echo "Deploying to $ENV environment..."
            DEPLOY_PATH="/home/taxlah/api/$ENV"
            
            # Create deployment directory if it doesn't exist
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST "mkdir -p $DEPLOY_PATH"
            
            # Sync files to server
            rsync -avz --delete \
              --exclude 'node_modules' \
              --exclude '.git' \
              --exclude '.env' \
              --exclude 'logs' \
              --exclude 'file' \
              --exclude 'assets' \
              -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
              ./ $DEPLOY_USER@$SERVER_HOST:$DEPLOY_PATH/
          done

      - name: Deploy to single environment
        if: steps.env.outputs.deploy_mode == 'single'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ steps.env.outputs.deploy_path }}
        run: |
          # Create deployment directory if it doesn't exist
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST "mkdir -p $DEPLOY_PATH"
          
          # Sync files to server
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'logs' \
            --exclude 'file' \
            --exclude 'assets' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ $DEPLOY_USER@$SERVER_HOST:$DEPLOY_PATH/

      - name: Install dependencies and restart PM2 (all environments)
        if: steps.env.outputs.deploy_mode == 'all'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          # Development secrets
          DEV_DB_HOST: ${{ secrets.DEV_DB_HOST }}
          DEV_DB_USERNAME: ${{ secrets.DEV_DB_USERNAME }}
          DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          DEV_DB_DATABASE: ${{ secrets.DEV_DB_DATABASE }}
          DEV_APP_SECRET: ${{ secrets.DEV_APP_SECRET }}
          DEV_ADMIN_SECRET: ${{ secrets.DEV_ADMIN_SECRET }}
          DEV_CHIP_BRAND_ID: ${{ secrets.DEV_CHIP_BRAND_ID }}
          DEV_CHIP_API_KEY: ${{ secrets.DEV_CHIP_API_KEY }}
          DEV_CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.DEV_CHIP_WEBHOOK_PUBLIC_KEY }}
          DEV_CHIP_CALLBACK_URL: ${{ secrets.DEV_CHIP_CALLBACK_URL }}
          # Staging secrets
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_DB_DATABASE: ${{ secrets.STAGING_DB_DATABASE }}
          STAGING_APP_SECRET: ${{ secrets.STAGING_APP_SECRET }}
          STAGING_ADMIN_SECRET: ${{ secrets.STAGING_ADMIN_SECRET }}
          STAGING_CHIP_BRAND_ID: ${{ secrets.STAGING_CHIP_BRAND_ID }}
          STAGING_CHIP_API_KEY: ${{ secrets.STAGING_CHIP_API_KEY }}
          STAGING_CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.STAGING_CHIP_WEBHOOK_PUBLIC_KEY }}
          STAGING_CHIP_CALLBACK_URL: ${{ secrets.STAGING_CHIP_CALLBACK_URL }}
          # Production secrets
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PROD_APP_SECRET: ${{ secrets.PROD_APP_SECRET }}
          PROD_ADMIN_SECRET: ${{ secrets.PROD_ADMIN_SECRET }}
          PROD_CHIP_BRAND_ID: ${{ secrets.PROD_CHIP_BRAND_ID }}
          PROD_CHIP_API_KEY: ${{ secrets.PROD_CHIP_API_KEY }}
          PROD_CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.PROD_CHIP_WEBHOOK_PUBLIC_KEY }}
          PROD_CHIP_CALLBACK_URL: ${{ secrets.PROD_CHIP_CALLBACK_URL }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST << 'EOF'
            # Deploy to all environments
            for ENV in development staging production; do
              echo "Setting up $ENV environment..."
              DEPLOY_PATH="/home/taxlah/api/$ENV"

              if [ "$ENV" = "production" ]; then
                PM2_APP="taxlah-production-api"
                PORT=4000
                DB_HOST="${PROD_DB_HOST}"
                DB_USERNAME="${PROD_DB_USERNAME}"
                DB_PASSWORD="${PROD_DB_PASSWORD}"
                DB_DATABASE="${PROD_DB_DATABASE}"
                APP_SECRET="${PROD_APP_SECRET}"
                ADMIN_SECRET="${PROD_ADMIN_SECRET}"
                CHIP_BRAND_ID="${PROD_CHIP_BRAND_ID}"
                CHIP_API_KEY="${PROD_CHIP_API_KEY}"
                CHIP_WEBHOOK_PUBLIC_KEY="${PROD_CHIP_WEBHOOK_PUBLIC_KEY}"
                CHIP_CALLBACK_URL="${PROD_CHIP_CALLBACK_URL}"
                BASE_URL="https://taxlah.com"
              elif [ "$ENV" = "staging" ]; then
                PM2_APP="taxlah-staging-api"
                PORT=3100
                DB_HOST="${STAGING_DB_HOST}"
                DB_USERNAME="${STAGING_DB_USERNAME}"
                DB_PASSWORD="${STAGING_DB_PASSWORD}"
                DB_DATABASE="${STAGING_DB_DATABASE}"
                APP_SECRET="${STAGING_APP_SECRET}"
                ADMIN_SECRET="${STAGING_ADMIN_SECRET}"
                CHIP_BRAND_ID="${STAGING_CHIP_BRAND_ID}"
                CHIP_API_KEY="${STAGING_CHIP_API_KEY}"
                CHIP_WEBHOOK_PUBLIC_KEY="${STAGING_CHIP_WEBHOOK_PUBLIC_KEY}"
                CHIP_CALLBACK_URL="${STAGING_CHIP_CALLBACK_URL}"
                BASE_URL="https://staging.taxlah.com"
              elif [ "$ENV" = "development" ]; then
                PM2_APP="taxlah-development-api"
                PORT=3000
                DB_HOST="${DEV_DB_HOST}"
                DB_USERNAME="${DEV_DB_USERNAME}"
                DB_PASSWORD="${DEV_DB_PASSWORD}"
                DB_DATABASE="${DEV_DB_DATABASE}"
                APP_SECRET="${DEV_APP_SECRET}"
                ADMIN_SECRET="${DEV_ADMIN_SECRET}"
                CHIP_BRAND_ID="${DEV_CHIP_BRAND_ID}"
                CHIP_API_KEY="${DEV_CHIP_API_KEY}"
                CHIP_WEBHOOK_PUBLIC_KEY="${DEV_CHIP_WEBHOOK_PUBLIC_KEY}"
                CHIP_CALLBACK_URL="${DEV_CHIP_CALLBACK_URL}"
                BASE_URL="https://dev.taxlah.com"
              fi
              
              cd $DEPLOY_PATH
              
              # Create .env file with secrets
              cat > .env << ENVEOF
              PORT=$PORT
              DB_HOST=$DB_HOST
              DB_USERNAME=$DB_USERNAME
              DB_PASSWORD=$DB_PASSWORD
              DB_DATABASE=$DB_DATABASE
              APP_SECRET=$APP_SECRET
              ADMIN_SECRET=$ADMIN_SECRET
              CHIP_BRAND_ID=$CHIP_BRAND_ID
              CHIP_API_KEY=$CHIP_API_KEY
              CHIP_WEBHOOK_PUBLIC_KEY=$CHIP_WEBHOOK_PUBLIC_KEY
              CHIP_CALLBACK_URL=$CHIP_CALLBACK_URL
              BASE_URL=$BASE_URL
              CHIP_API_URL=https://gate.chip-in.asia/api/v1
              NODE_ENV=$ENV
              ENVEOF
              
              # Install production dependencies
              npm install
              
              # Create logs directory if it doesn't exist
              mkdir -p logs
              mkdir -p file
              mkdir -p assets
              
              # Reload or start PM2 app with environment variables from .env
              if pm2 describe $PM2_APP > /dev/null 2>&1; then
                echo "Reloading existing PM2 app: $PM2_APP"
                pm2 restart ecosystem.config.js --only $PM2_APP --update-env
              else
                echo "Starting new PM2 app: $PM2_APP"
                pm2 start ecosystem.config.js --only $PM2_APP
              fi
            done
            
            # Save PM2 configuration
            pm2 save
          EOF

      - name: Install dependencies and restart PM2 (single environment)
        if: steps.env.outputs.deploy_mode == 'single'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_PATH: ${{ steps.env.outputs.deploy_path }}
          PM2_APP: ${{ steps.env.outputs.pm2_app }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
          # Development secrets
          DEV_DB_HOST: ${{ secrets.DEV_DB_HOST }}
          DEV_DB_USERNAME: ${{ secrets.DEV_DB_USERNAME }}
          DEV_DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          DEV_DB_DATABASE: ${{ secrets.DEV_DB_DATABASE }}
          DEV_APP_SECRET: ${{ secrets.DEV_APP_SECRET }}
          DEV_ADMIN_SECRET: ${{ secrets.DEV_ADMIN_SECRET }}
          DEV_CHIP_BRAND_ID: ${{ secrets.DEV_CHIP_BRAND_ID }}
          DEV_CHIP_API_KEY: ${{ secrets.DEV_CHIP_API_KEY }}
          DEV_CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.DEV_CHIP_WEBHOOK_PUBLIC_KEY }}
          DEV_CHIP_CALLBACK_URL: ${{ secrets.DEV_CHIP_CALLBACK_URL }}
          # Staging secrets
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_USERNAME: ${{ secrets.STAGING_DB_USERNAME }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_DB_DATABASE: ${{ secrets.STAGING_DB_DATABASE }}
          STAGING_APP_SECRET: ${{ secrets.STAGING_APP_SECRET }}
          STAGING_ADMIN_SECRET: ${{ secrets.STAGING_ADMIN_SECRET }}
          STAGING_CHIP_BRAND_ID: ${{ secrets.STAGING_CHIP_BRAND_ID }}
          STAGING_CHIP_API_KEY: ${{ secrets.STAGING_CHIP_API_KEY }}
          STAGING_CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.STAGING_CHIP_WEBHOOK_PUBLIC_KEY }}
          STAGING_CHIP_CALLBACK_URL: ${{ secrets.STAGING_CHIP_CALLBACK_URL }}
          # Production secrets
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_DB_DATABASE: ${{ secrets.PROD_DB_DATABASE }}
          PROD_APP_SECRET: ${{ secrets.PROD_APP_SECRET }}
          PROD_ADMIN_SECRET: ${{ secrets.PROD_ADMIN_SECRET }}
          PROD_CHIP_BRAND_ID: ${{ secrets.PROD_CHIP_BRAND_ID }}
          PROD_CHIP_API_KEY: ${{ secrets.PROD_CHIP_API_KEY }}
          PROD_CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.PROD_CHIP_WEBHOOK_PUBLIC_KEY }}
          PROD_CHIP_CALLBACK_URL: ${{ secrets.PROD_CHIP_CALLBACK_URL }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            
            # Determine which environment variables to use
            if [ "${{ env.ENVIRONMENT }}" = "production" ]; then
              PORT=4000
              DB_HOST="${PROD_DB_HOST}"
              DB_USERNAME="${PROD_DB_USERNAME}"
              DB_PASSWORD="${PROD_DB_PASSWORD}"
              DB_DATABASE="${PROD_DB_DATABASE}"
              APP_SECRET="${PROD_APP_SECRET}"
              ADMIN_SECRET="${PROD_ADMIN_SECRET}"
              CHIP_BRAND_ID="${PROD_CHIP_BRAND_ID}"
              CHIP_API_KEY="${PROD_CHIP_API_KEY}"
              CHIP_WEBHOOK_PUBLIC_KEY="${PROD_CHIP_WEBHOOK_PUBLIC_KEY}"
              CHIP_CALLBACK_URL="${PROD_CHIP_CALLBACK_URL}"
              BASE_URL="https://taxlah.com"
            elif [ "${{ env.ENVIRONMENT }}" = "staging" ]; then
              PORT=3100
              DB_HOST="${STAGING_DB_HOST}"
              DB_USERNAME="${STAGING_DB_USERNAME}"
              DB_PASSWORD="${STAGING_DB_PASSWORD}"
              DB_DATABASE="${STAGING_DB_DATABASE}"
              APP_SECRET="${STAGING_APP_SECRET}"
              ADMIN_SECRET="${STAGING_ADMIN_SECRET}"
              CHIP_BRAND_ID="${STAGING_CHIP_BRAND_ID}"
              CHIP_API_KEY="${STAGING_CHIP_API_KEY}"
              CHIP_WEBHOOK_PUBLIC_KEY="${STAGING_CHIP_WEBHOOK_PUBLIC_KEY}"
              CHIP_CALLBACK_URL="${STAGING_CHIP_CALLBACK_URL}"
              BASE_URL="https://staging.taxlah.com"
            elif [ "${{ env.ENVIRONMENT }}" = "development" ]; then
              PORT=3000
              DB_HOST="${DEV_DB_HOST}"
              DB_USERNAME="${DEV_DB_USERNAME}"
              DB_PASSWORD="${DEV_DB_PASSWORD}"
              DB_DATABASE="${DEV_DB_DATABASE}"
              APP_SECRET="${DEV_APP_SECRET}"
              ADMIN_SECRET="${DEV_ADMIN_SECRET}"
              CHIP_BRAND_ID="${DEV_CHIP_BRAND_ID}"
              CHIP_API_KEY="${DEV_CHIP_API_KEY}"
              CHIP_WEBHOOK_PUBLIC_KEY="${DEV_CHIP_WEBHOOK_PUBLIC_KEY}"
              CHIP_CALLBACK_URL="${DEV_CHIP_CALLBACK_URL}"
              BASE_URL="https://dev.taxlah.com"
            fi
            
            # Create .env file with secrets
            cat > .env << ENVEOF
            PORT=$PORT
            DB_HOST=$DB_HOST
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            DB_DATABASE=$DB_DATABASE
            APP_SECRET=$APP_SECRET
            ADMIN_SECRET=$ADMIN_SECRET
            CHIP_BRAND_ID=$CHIP_BRAND_ID
            CHIP_API_KEY=$CHIP_API_KEY
            CHIP_WEBHOOK_PUBLIC_KEY=$CHIP_WEBHOOK_PUBLIC_KEY
            CHIP_CALLBACK_URL=$CHIP_CALLBACK_URL
            BASE_URL=$BASE_URL
            CHIP_API_URL=https://gate.chip-in.asia/api/v1
            NODE_ENV=${{ env.ENVIRONMENT }}
            ENVEOF
            
            # Install production dependencies
            npm install --production
            
            # Create logs directory if it doesn't exist
            mkdir -p logs
            mkdir -p file
            mkdir -p assets
            
            # Reload or start PM2 app
            if pm2 describe ${{ env.PM2_APP }} > /dev/null 2>&1; then
              echo "Reloading existing PM2 app: ${{ env.PM2_APP }}"
              pm2 reload ecosystem.config.js --only ${{ env.PM2_APP }} --update-env
            else
              echo "Starting new PM2 app: ${{ env.PM2_APP }}"
              pm2 start ecosystem.config.js --only ${{ env.PM2_APP }}
            fi
            
            # Save PM2 configuration
            pm2 save
          EOF

      - name: Verify deployment (all environments)
        if: steps.env.outputs.deploy_mode == 'all'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST << 'EOF'
            export PATH=$PATH:/usr/local/bin:/usr/bin
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            pm2 status
          EOF

      - name: Verify deployment (single environment)
        if: steps.env.outputs.deploy_mode == 'single'
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          PM2_APP: ${{ steps.env.outputs.pm2_app }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST << 'EOF'
            export PATH=$PATH:/usr/local/bin:/usr/bin
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            pm2 status ${{ env.PM2_APP }}
          EOF

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
