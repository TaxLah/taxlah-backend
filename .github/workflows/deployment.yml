name: Deploy to Server

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            environment:
                description: "Deployment environment"
                required: true
                type: choice
                options:
                    - development
                    - staging
                    - production

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            environments: ${{ steps.set-envs.outputs.environments }}
        steps:
            - name: Set environments to deploy
              id: set-envs
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo 'environments=["${{ github.event.inputs.environment }}"]' >> $GITHUB_OUTPUT
                  else
                    echo 'environments=["development", "staging", "production"]' >> $GITHUB_OUTPUT
                  fi

    deploy:
        needs: prepare
        runs-on: ubuntu-latest
        strategy:
            matrix:
                environment: ${{ fromJson(needs.prepare.outputs.environments) }}
            fail-fast: false

        # Pulls secrets from the matching GitHub Environment
        environment: ${{ matrix.environment }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm install

            - name: Set deployment variables
              id: vars
              run: |
                  ENV="${{ matrix.environment }}"

                  if [ "$ENV" = "production" ]; then
                    echo "pm2_app=taxlah-production-api" >> $GITHUB_OUTPUT
                    echo "deploy_path=/home/taxlah/api/production" >> $GITHUB_OUTPUT
                    echo "port=4000" >> $GITHUB_OUTPUT
                    echo "base_url=https://taxlah.com" >> $GITHUB_OUTPUT
                  elif [ "$ENV" = "staging" ]; then
                    echo "pm2_app=taxlah-staging-api" >> $GITHUB_OUTPUT
                    echo "deploy_path=/home/taxlah/api/staging" >> $GITHUB_OUTPUT
                    echo "port=3001" >> $GITHUB_OUTPUT
                    echo "base_url=https://staging.taxlah.com" >> $GITHUB_OUTPUT
                  else
                    echo "pm2_app=taxlah-development-api" >> $GITHUB_OUTPUT
                    echo "deploy_path=/home/taxlah/api/development" >> $GITHUB_OUTPUT
                    echo "port=3000" >> $GITHUB_OUTPUT
                    echo "base_url=https://dev.taxlah.com" >> $GITHUB_OUTPUT
                  fi

            - name: Setup SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key
                  ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Deploy files to server
              env:
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  SERVER_HOST: ${{ secrets.SERVER_HOST }}
                  DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
              run: |
                  echo "Deploying to ${{ matrix.environment }} environment..."

                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST "mkdir -p $DEPLOY_PATH"

                  rsync -avz --delete \
                    --exclude 'node_modules' \
                    --exclude '.git' \
                    --exclude '.env' \
                    --exclude 'env.yaml' \
                    --exclude 'logs' \
                    --exclude 'file' \
                    --exclude 'asset' \
                    --exclude 'assets' \
                    --exclude 'taxlah-react-native-firebasesdk.json' \
                    -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
                    ./ $DEPLOY_USER@$SERVER_HOST:$DEPLOY_PATH/

            - name: Create env.yaml on server
              env:
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  SERVER_HOST: ${{ secrets.SERVER_HOST }}
                  DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
                  ENV_NAME: ${{ matrix.environment }}
                  PORT: ${{ steps.vars.outputs.port }}
                  BASE_URL: ${{ steps.vars.outputs.base_url }}
                  DB_HOST: ${{ secrets.DB_HOST }}
                  DB_USERNAME: ${{ secrets.DB_USERNAME }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  DB_DATABASE: ${{ secrets.DB_DATABASE }}
                  APP_SECRET: ${{ secrets.APP_SECRET }}
                  ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
                  CHIP_BRAND_ID: ${{ secrets.CHIP_BRAND_ID }}
                  CHIP_API_KEY: ${{ secrets.CHIP_API_KEY }}
                  CHIP_WEBHOOK_PUBLIC_KEY: ${{ secrets.CHIP_WEBHOOK_PUBLIC_KEY }}
                  CHIP_CALLBACK_URL: ${{ secrets.CHIP_CALLBACK_URL }}
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: |
                  # Build env.yaml locally on the runner, then SCP it to the server
                  {
                    echo "${ENV_NAME}:"
                    echo "  PORT: ${PORT}"
                    echo "  SECRET: \"${ENV_NAME}\""
                    echo "  DB_HOST: \"${DB_HOST}\""
                    echo "  DB_USERNAME: \"${DB_USERNAME}\""
                    echo "  DB_PASSWORD: \"${DB_PASSWORD}\""
                    echo "  DB_DATABASE: \"${DB_DATABASE}\""
                    echo "  APP_SECRET: \"${APP_SECRET}\""
                    echo "  ADMIN_SECRET: \"${ADMIN_SECRET}\""
                    echo "  CHIP_BRAND_ID: \"${CHIP_BRAND_ID}\""
                    echo "  CHIP_API_KEY: \"${CHIP_API_KEY}\""
                    echo "  CHIP_WEBHOOK_PUBLIC_KEY: |"
                    printf '%s\n' "${CHIP_WEBHOOK_PUBLIC_KEY}" | sed 's/^/    /'
                    echo "  CHIP_CALLBACK_URL: \"${CHIP_CALLBACK_URL}\""
                    echo "  BASE_URL: \"${BASE_URL}\""
                    echo "  CHIP_API_URL: \"https://gate.chip-in.asia/api/v1\""
                    echo "  OPENAI_API_KEY: \"${OPENAI_API_KEY}\""
                  } > /tmp/env.yaml

                  scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/env.yaml $DEPLOY_USER@$SERVER_HOST:$DEPLOY_PATH/env.yaml
                  rm -f /tmp/env.yaml

            - name: Install dependencies and restart PM2
              env:
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  SERVER_HOST: ${{ secrets.SERVER_HOST }}
                  DEPLOY_PATH: ${{ steps.vars.outputs.deploy_path }}
                  PM2_APP: ${{ steps.vars.outputs.pm2_app }}
              run: |
                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST << EOF
                    export NVM_DIR="\$HOME/.nvm"
                    [ -s "\$NVM_DIR/nvm.sh" ] && \. "\$NVM_DIR/nvm.sh"

                    cd $DEPLOY_PATH

                    npm install
                    mkdir -p logs file asset assets

                    if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
                      echo "Reloading existing PM2 app: $PM2_APP"
                      pm2 restart ecosystem.config.js --only "$PM2_APP" --update-env
                    else
                      echo "Starting new PM2 app: $PM2_APP"
                      pm2 start ecosystem.config.js --only "$PM2_APP"
                    fi

                    pm2 save
                  EOF

            - name: Verify deployment
              env:
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  SERVER_HOST: ${{ secrets.SERVER_HOST }}
              run: |
                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_HOST << 'EOF'
                    export PATH=$PATH:/usr/local/bin:/usr/bin
                    export NVM_DIR="$HOME/.nvm"
                    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                    pm2 status
                  EOF

            - name: Cleanup SSH key
              if: always()
              run: |
                  rm -f ~/.ssh/deploy_key
